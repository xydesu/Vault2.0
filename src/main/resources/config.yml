# Vault 2.0 — internal economy compatible with the Vault API
# Provides internal economy services and config reload.
# Commands: /vault reload. No external Vault.jar required.

# Storage configuration
storage:
  # Autosave interval in seconds (0 disables periodic autosave)
  autosave_seconds: 30
  
  # Set to true to use MySQL. If false, balances will be saved locally to balances.yml
  use_mysql: false
  mysql:
    host: "localhost"
    port: 3306
    database: "minecraft"
    username: "root"
    password: ""
    table_prefix: "vault_"
    pool_size: 10
    minimum_idle: 2

# UUID resolution for offline-mode servers
# true: allow operations with unseen players by generating offline UUIDs
offline-uuid-fallback: true